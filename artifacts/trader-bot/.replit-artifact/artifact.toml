kind = "web"
previewPath = "/"
title = "UltraTrader Bot"
version = "1.0.0"
id = "artifacts/trader-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18356

[services.development]
run = "pnpm --filter @workspace/trader-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trader-bot", "run", "build" ]
publicDir = "artifacts/trader-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18356"
BASE_PATH = "/"
